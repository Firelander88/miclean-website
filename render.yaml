services:
  - type: web
    name: miclean-admin
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ADMIN_KEY
        sync: false  # Set manually in Render dashboard
      - key: ALLOWED_ORIGIN
        value: https://micleangroup.az
    healthCheckPath: /api/health
    autoDeploy: false
