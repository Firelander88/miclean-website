const PER = 50;
const CATS = [
  'Kimyəvi Təmizlik Vasitələri',
  'Camaşırxana Məhsulları',
  'Mətbəx Gigiyena Məhsulları',
  'İstehlak Materialları',
  'Housekeeping Alətləri',
  'Hotel Amenity',
  'Hovuz Təmizliyi'
];
let ST = {cat:'',q:'',page:1,data:[]};

CATS.forEach(function(c,i){
  var n = PRODUCTS.filter(function(p){return p.kateqoriya===c;}).length;
  var el = document.getElementById('cnt-'+i);
  if(el) el.textContent = n;
});

function run(){
  var q = ST.q.toLowerCase().trim();
  ST.data = PRODUCTS.filter(function(p){
    if(ST.cat && p.kateqoriya !== ST.cat) return false;
    if(q){
      var h = ((p.title||'')+' '+(p.altKateqoriya||'')+' '+(p.kod||'')).toLowerCase();
      if(h.indexOf(q)===-1) return false;
    }
    return true;
  });
  ST.page = 1;
  draw();
}

function draw(){
  var n = ST.data.length;
  document.getElementById('countBadge').textContent = n + ' məhsul';
  var lbl = ST.cat || (ST.q ? 'Axtarış nəticələri' : 'Bütün məhsullar');
  document.getElementById('mh').textContent = lbl + ' — ' + n + ' məhsul';
  drawGrid();
  drawPag();
}

function X(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function drawGrid(){
  var g = document.getElementById('grid');
  var s = (ST.page-1)*PER;
  var items = ST.data.slice(s, s+PER);
  if(!items.length){
    g.innerHTML = '<div class="empty-state"><div class="ei">&#128269;</div><h3>Heç bir məhsul tapılmadı</h3><p>Axtarış sorğunuzu dəyişdirin</p></div>';
    return;
  }
  var h='';
  for(var i=0;i<items.length;i++){
    var p=items[i], idx=s+i;
    var t=p.terkib?(p.terkib.length>110?X(p.terkib.substring(0,110))+'...':X(p.terkib)):'';
    var cs=p.kateqoriya?X(p.kateqoriya.split(' ')[0]):'';
    h+='<div class="card" role="listitem" tabindex="0" data-i="'+idx+'">';
    h+='<div class="ccats">';
    if(cs) h+='<span class="ccat">'+cs+'</span>';
    if(p.altKateqoriya) h+='<span class="csub">'+X(p.altKateqoriya)+'</span>';
    h+='</div>';
    h+='<div class="ctitle">'+X(p.title)+'</div>';
    h+='<div class="ckod">'+X(p.kod)+'</div>';
    h+='<div class="cmeta">';
    if(p.qablasdirma) h+='<span class="badge bg">'+X(p.qablasdirma)+'</span>';
    if(p.minSifaris) h+='<span class="badge">Min: '+X(p.minSifaris)+'</span>';
    h+='</div>';
    if(t) h+='<div class="cterkib">'+t+'</div>';
    h+='</div>';
  }
  g.innerHTML = h;
  g.querySelectorAll('.card').forEach(function(c){
    c.addEventListener('click',function(){openM(parseInt(c.dataset.i));});
    c.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();openM(parseInt(c.dataset.i));}});
  });
}

function pb(n){
  return '<button class="pbtn'+(n===ST.page?' active':'')+'" data-p="'+n+'">'+n+'</button>';
}
function drawPag(){
  var tot=ST.data.length, pages=Math.ceil(tot/PER);
  var pg=document.getElementById('pag');
  if(pages<=1){pg.innerHTML='';return;}
  var h='';
  h+='<button class="pbtn" id="pp"'+(ST.page<=1?' disabled':'')+'>&#9664;</button>';
  var s=Math.max(1,ST.page-2), e=Math.min(pages,ST.page+2);
  if(s>1){h+=pb(1);if(s>2)h+='<span class="pinfo">…</span>';}
  for(var i=s;i<=e;i++) h+=pb(i);
  if(e<pages){if(e<pages-1)h+='<span class="pinfo">…</span>';h+=pb(pages);}
  h+='<button class="pbtn" id="pn"'+(ST.page>=pages?' disabled':'')+'>&#9654;</button>';
  h+='<span class="pinfo">Səhifə '+ST.page+' / '+pages+'</span>';
  pg.innerHTML=h;
  pg.querySelectorAll('[data-p]').forEach(function(b){
    b.addEventListener('click',function(){ST.page=parseInt(b.dataset.p);draw();window.scrollTo(0,68);});
  });
  var pp=pg.querySelector('#pp'), pn=pg.querySelector('#pn');
  if(pp) pp.addEventListener('click',function(){if(ST.page>1){ST.page--;draw();window.scrollTo(0,68);}});
  if(pn) pn.addEventListener('click',function(){if(ST.page<pages){ST.page++;draw();window.scrollTo(0,68);}});
}

var FC=[
  {k:'terkib',l:'Tərkib',f:true},
  {k:'istifadeMeqsedi',l:'İstifadə məqsədi',f:true},
  {k:'texnikiTesivr',l:'Texniki təsir',f:false},
  {k:'istifadeSahesi',l:'İstifadə sahəsi',f:true},
  {k:'catdirilmaMuddeti',l:'Çatdırılma müddəti',f:false},
  {k:'qablasdirma',l:'Qablaşdırma',f:false},
  {k:'minSifaris',l:'Min. sifariş',f:false}
];

function openM(idx){
  var p=ST.data[idx]; if(!p) return;
  document.getElementById('mtitle').textContent=p.title||'';
  document.getElementById('mkod').textContent=p.kod?'Kod: '+p.kod:'';
  var ch='';
  if(p.kateqoriya) ch+='<span class="ccat">'+X(p.kateqoriya)+'</span>';
  if(p.altKateqoriya) ch+='<span class="csub">'+X(p.altKateqoriya)+'</span>';
  document.getElementById('mcats').innerHTML=ch;
  var fh='';
  FC.forEach(function(c){
    var v=p[c.k], emp=!v||String(v).trim()===''||String(v).trim()==='—';
    fh+='<div class="fi'+(c.f?' full':'')+'"><div class="flabel">'+c.l+'</div>';
    fh+='<div class="fval'+(emp?' empty':'')+'">'+( emp?'Məlumat yoxdur':X(String(v)) )+'</div></div>';
  });
  document.getElementById('mfields').innerHTML=fh;
  document.getElementById('mov').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeM(){
  document.getElementById('mov').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('mclose').addEventListener('click',closeM);
document.getElementById('mov').addEventListener('click',function(e){if(e.target===document.getElementById('mov')) closeM();});
document.addEventListener('keydown',function(e){if(e.key==='Escape') closeM();});

document.querySelectorAll('.sbtn').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.sbtn').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    ST.cat=b.dataset.cat;
    run();
    cMob();
  });
});

var st2;
document.getElementById('searchInput').addEventListener('input',function(e){
  clearTimeout(st2);
  var v=e.target.value;
  st2=setTimeout(function(){ST.q=v;run();},220);
});

function cMob(){
  document.getElementById('sidebar').classList.remove('mopen');
  document.getElementById('mobOv').classList.remove('active');
}
document.getElementById('mobBtn').addEventListener('click',function(){
  var s=document.getElementById('sidebar'), o=document.getElementById('mobOv');
  var op=s.classList.toggle('mopen');
  o.classList.toggle('active',op);
});
document.getElementById('mobOv').addEventListener('click',cMob);

run();
</script>
