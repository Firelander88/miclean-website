<div id='mc' style='position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:2147483647;background:#0A1628;color:#fff;font-family:system-ui,sans-serif;display:flex;flex-direction:column;overflow:hidden'>
<div style='display:flex;align-items:center;padding:10px 16px;background:#0d1b30;border-bottom:1px solid #1a2a44;gap:12px;flex-shrink:0'>
<span style='color:#C9A96E;font-weight:700;font-size:15px;white-space:nowrap'>MI CLEAN GROUP</span>
<span style='color:#8899aa;font-size:13px;white-space:nowrap'>Məhsul Kataloqu</span>
<input id='ms' placeholder='Axtar...' style='flex:1;padding:7px 12px;border-radius:6px;border:1px solid #1a2a44;background:#121f33;color:#fff;font-size:13px;outline:none;min-width:100px'>
<span id='mn' style='background:#C9A96E;color:#0A1628;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700'></span>
</div>
<div style='display:flex;flex:1;overflow:hidden'>
<div id='sb' style='width:200px;padding:8px;overflow-y:auto;border-right:1px solid #1a2a44;flex-shrink:0'></div>
<div style='flex:1;display:flex;flex-direction:column;overflow:hidden'>
<div id='mg' style='flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;align-content:start'></div>
<div id='mp' style='display:flex;justify-content:center;align-items:center;gap:8px;padding:8px;border-top:1px solid #1a2a44;flex-shrink:0'></div>
</div>
</div>
</div>
<style>
#mc *::-webkit-scrollbar{width:6px}#mc *::-webkit-scrollbar-thumb{background:#1a2a44;border-radius:3px}
.cb{display:block;width:100%;padding:8px;margin:2px 0;border:none;border-radius:6px;background:transparent;color:#ccc;text-align:left;cursor:pointer;font-size:12px}
.cb:hover,.cb.ac{background:#162240;color:#C9A96E}
.cb .cn{display:block;font-weight:600;font-size:12px}.cb .cc{font-size:10px;color:#667}
.pc{background:#121f33;border:1px solid #1a2a44;border-radius:8px;padding:12px;transition:border-color .2s}
.pc:hover{border-color:#C9A96E}
.pt{font-weight:700;font-size:13px;margin-bottom:4px;line-height:1.3}
.ps{color:#C9A96E;font-size:11px;margin-bottom:6px}
.pb{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;margin-right:4px;margin-top:2px}
.pk{background:#1a2a44;color:#8899aa}.pp{background:#162240;color:#C9A96E}
.pg{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.bt{padding:4px 10px;border:1px solid #1a2a44;border-radius:4px;background:transparent;color:#ccc;cursor:pointer;font-size:12px}
.bt:hover,.bt.ac{background:#C9A96E;color:#0A1628;border-color:#C9A96E}
</style>
<script>
(function(){
const K=["Kimyəvi Təmizlik Vasitələri","Camaşırxana Məhsulları","Mətbəx Gigiyena Məhsulları","İstehlak Materialları","Housekeeping Alətləri","Hotel Amenity","Hovuz Təmizliyi"];
const PP=40;
let F=-1,P=0,Q='';
function D(){let a=[];(window._M||[]).forEach(c=>c.forEach(p=>a.push(p)));return a}
function G(){
let a=D(),f=a;
if(F>=0)f=f.filter(p=>p[1]===F);
if(Q)f=f.filter(p=>(p[0]+p[2]+p[5]).toLowerCase().includes(Q));
return f;
}
function R(){
let f=G(),tp=Math.ceil(f.length/PP)||1;
if(P>=tp)P=tp-1;if(P<0)P=0;
document.getElementById('mn').textContent=f.length+' məhsul';
let s=P*PP,e=Math.min(s+PP,f.length),g=document.getElementById('mg');
g.innerHTML='';
for(let i=s;i<e;i++){
let p=f[i],d=document.createElement('div');d.className='pc';
d.innerHTML='<div class="pt">'+p[0]+'</div><div class="ps">'+p[2]+'</div><div class="pg">'+(p[3]?'<span class="pb pp">'+p[3]+'</span>':'')+(p[5]?'<span class="pb pk">'+p[5]+'</span>':'')+'</div>';
g.appendChild(d);
}
let pg=document.getElementById('mp');pg.innerHTML='';
if(tp>1){
let pb=document.createElement('button');pb.className='bt'+(P===0?' disabled':'');pb.textContent='←';pb.onclick=()=>{if(P>0){P--;R()}};pg.appendChild(pb);
let info=document.createElement('span');info.style.cssText='color:#8899aa;font-size:12px';info.textContent=(P+1)+' / '+tp;pg.appendChild(info);
let nb=document.createElement('button');nb.className='bt';nb.textContent='→';nb.onclick=()=>{if(P<tp-1){P++;R()}};pg.appendChild(nb);
}
}
function B(){
let a=D(),sb=document.getElementById('sb');sb.innerHTML='';
let all=document.createElement('button');all.className='cb'+(F===-1?' ac':'');
all.innerHTML='<span class="cn">Hamısı</span><span class="cc">'+a.length+'</span>';
all.onclick=()=>{F=-1;P=0;B();R()};sb.appendChild(all);
K.forEach((n,i)=>{
let c=a.filter(p=>p[1]===i).length;
let b=document.createElement('button');b.className='cb'+(F===i?' ac':'');
b.innerHTML='<span class="cn">'+n+'</span><span class="cc">'+c+'</span>';
b.onclick=()=>{F=i;P=0;B();R()};sb.appendChild(b);
});
}
function init(){if(!D().length){setTimeout(init,100);return}B();R();}
document.getElementById('ms').addEventListener('input',function(){Q=this.value.toLowerCase();P=0;R()});
init();
})();
</script>
