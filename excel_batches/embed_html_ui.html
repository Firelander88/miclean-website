<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#0a2351;--acc:#1a73e8;--bg:#f5f7fa;--card:#fff;--txt:#1a1a2e;--sub:#5f6368;--brd:#e0e3e8;--r:12px;--sh:0 2px 12px rgba(0,0,0,.08)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);line-height:1.5}
.hdr{background:linear-gradient(135deg,var(--pri) 0%,#143a7a 100%);color:#fff;padding:28px 24px 20px;text-align:center}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:.5px;margin-bottom:4px}
.hdr p{font-size:13px;opacity:.8}
.bar{background:#fff;padding:12px 16px;position:sticky;top:0;z-index:10;box-shadow:var(--sh);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.bar input{flex:1;min-width:180px;padding:10px 14px;border:1.5px solid var(--brd);border-radius:var(--r);font-size:14px;outline:none;transition:border .2s}
.bar input:focus{border-color:var(--acc)}
.bar select{padding:10px 12px;border:1.5px solid var(--brd);border-radius:var(--r);font-size:13px;background:#fff;outline:none;cursor:pointer;max-width:200px}
.bar select:focus{border-color:var(--acc)}
.cnt{display:flex;gap:8px;padding:8px 12px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--brd)}
.cnt::-webkit-scrollbar{height:0}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1.5px solid var(--brd);background:#fff;color:var(--sub);transition:all .2s}
.chip:hover{border-color:var(--acc);color:var(--acc)}
.chip.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.stats{padding:10px 16px;font-size:13px;color:var(--sub);display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;padding:0 16px 24px}
.card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;cursor:pointer;border:1px solid transparent}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(0,0,0,.12);border-color:var(--acc)}
.cimg{height:140px;background:linear-gradient(135deg,#e8edf5 0%,#f0f4f8 100%);display:flex;align-items:center;justify-content:center;position:relative}
.cimg .ico{font-size:40px;opacity:.4}
.badge{position:absolute;top:8px;left:8px;background:var(--pri);color:#fff;font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600}
.cbody{padding:14px}
.cbody h3{font-size:14px;font-weight:600;line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cbody .kod{font-size:11px;color:var(--acc);font-weight:600;margin-bottom:6px}
.cbody .cat{font-size:11px;color:var(--sub);margin-bottom:8px}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:3px 8px;background:#e8f0fe;color:var(--acc);border-radius:4px;font-weight:500}
.empty{text-align:center;padding:60px 20px;color:var(--sub)}
.empty .ei{font-size:48px;margin-bottom:12px;opacity:.3}
.empty p{font-size:15px}
.load{text-align:center;padding:80px 20px}
.spinner{width:40px;height:40px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.load p{color:var(--sub);font-size:14px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:var(--r);max-width:500px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mhdr{padding:20px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:start}
.mhdr h2{font-size:17px;font-weight:700;flex:1;padding-right:12px}
.mclose{width:32px;height:32px;border:none;background:var(--bg);border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.mbody{padding:20px}
.mrow{display:flex;margin-bottom:12px;font-size:13px}
.mrow .ml{width:110px;color:var(--sub);flex-shrink:0;font-weight:500}
.mrow .mv{flex:1;font-weight:400}
.mvars{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.mvar{padding:6px 14px;background:var(--bg);border-radius:8px;font-size:13px;font-weight:500;border:1.5px solid var(--brd)}
.mcta{display:block;margin-top:20px;padding:12px;background:var(--acc);color:#fff;text-align:center;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:background .2s}
.mcta:hover{background:#1557b0}
@media(max-width:600px){.grid{grid-template-columns:1fr 1fr;gap:10px;padding:0 10px 20px}.hdr{padding:20px 16px 16px}.hdr h1{font-size:18px}.card .cimg{height:100px}.cbody{padding:10px}.cbody h3{font-size:13px}}
@media(max-width:400px){.grid{grid-template-columns:1fr}}
</style>

<div class="hdr">
<h1>MI CLEAN GROUP — Məhsul Kataloqu</h1>
<p>Peşəkar təmizlik və gigiyena həlləri</p>
</div>
<div class="bar">
<input type="text" id="q" placeholder="Məhsul axtar... (ad, kod, kateqoriya)">
<select id="fCat"><option value="">Bütün kateqoriyalar</option></select>
<select id="fSub"><option value="">Bütün alt kateqoriyalar</option></select>
</div>
<div class="cnt" id="chips"></div>
<div class="stats" id="stats"></div>
<div id="main">
<div class="load"><div class="spinner"></div><p>Kataloq yüklənir...</p></div>
</div>
<div class="modal-bg" id="mbg">
<div class="modal">
<div class="mhdr"><h2 id="mt"></h2><button class="mclose" id="mc">&times;</button></div>
<div class="mbody" id="mbd"></div>
</div>
</div>

<script>
let P=[],curCat='',curSub='',curQ='';
const catIcons={'Kimyəvi Təmizlik Vasitələri':'🧪','Camaşırxana Məhsulları':'👔','Mətbəx Gigiyena Məhsulları':'🍽️','Hotel Amenity':'🏨','Housekeeping Alətləri':'🧹','Hovuz Təmizliyi':'🏊','İstehlak Materialları':'📦'};

setTimeout(function(){
P=window._mcD||[];
if(P.length)init();
else document.getElementById('main').innerHTML='<div class="empty"><div class="ei">⚠️</div><p>Məlumat yüklənmədi</p></div>';
},200);

function init(){
P.sort((a,b)=>a.c.localeCompare(b.c)||a.s.localeCompare(b.s)||a.t.localeCompare(b.t));
buildFilters();render();
}

function buildFilters(){
const cats=[...new Set(P.map(p=>p.c))].sort();
const fc=document.getElementById('fCat');
cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c+' ('+P.filter(p=>p.c===c).length+')';fc.appendChild(o)});

// chips
const ch=document.getElementById('chips');
const allChip=document.createElement('span');
allChip.className='chip on';allChip.textContent='Hamısı ('+P.length+')';
allChip.onclick=function(){curCat='';curSub='';document.getElementById('fCat').value='';document.getElementById('fSub').value='';
document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));this.classList.add('on');render()};
ch.appendChild(allChip);

cats.forEach(c=>{
const chip=document.createElement('span');
chip.className='chip';chip.textContent=(catIcons[c]||'📋')+' '+c.split(' ')[0];
chip.onclick=function(){curCat=c;curSub='';document.getElementById('fCat').value=c;updateSubs();
document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));this.classList.add('on');render()};
ch.appendChild(chip);
});

document.getElementById('fCat').onchange=function(){curCat=this.value;curSub='';updateSubs();render();
document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
if(!curCat)ch.firstChild.classList.add('on');
};
document.getElementById('fSub').onchange=function(){curSub=this.value;render()};
document.getElementById('q').oninput=function(){curQ=this.value.toLowerCase().trim();render()};
document.getElementById('mc').onclick=function(){document.getElementById('mbg').classList.remove('show')};
document.getElementById('mbg').onclick=function(e){if(e.target===this)this.classList.remove('show')};
}

function updateSubs(){
const fs=document.getElementById('fSub');
fs.innerHTML='<option value="">Bütün alt kateqoriyalar</option>';
if(!curCat)return;
const subs=[...new Set(P.filter(p=>p.c===curCat).map(p=>p.s))].sort();
subs.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;fs.appendChild(o)});
}

function render(){
const f=P.filter(p=>{
if(curCat&&p.c!==curCat)return false;
if(curSub&&p.s!==curSub)return false;
if(curQ){const h=(p.t+' '+p.k+' '+p.c+' '+p.s+(p.v||'')).toLowerCase();if(!h.includes(curQ))return false;}
return true;
});
document.getElementById('stats').innerHTML='<span>'+f.length+' məhsul tapıldı</span><span>Ümumi: '+P.length+' məhsul</span>';

if(!f.length){
document.getElementById('main').innerHTML='<div class="empty"><div class="ei">🔍</div><p>Heç bir məhsul tapılmadı</p></div>';
return;
}

let h='<div class="grid">';
f.forEach((p,i)=>{
const icon=catIcons[p.c]||'📋';
const vars=p.v?p.v.split(' / ').map(v=>'<span class="tag">'+esc(v)+'</span>').join(''):'';
h+='<div class="card" data-i="'+i+'" onclick="showDetail(this)"><div class="cimg"><span class="ico">'+icon+'</span>'
+'<span class="badge">'+esc(p.k)+'</span></div><div class="cbody"><h3>'+esc(p.t)+'</h3>'
+'<div class="kod">'+esc(p.k)+'</div><div class="cat">'+esc(p.s)+'</div>'
+(vars?'<div class="tags">'+vars+'</div>':'')+'</div></div>';
});
h+='</div>';
document.getElementById('main').innerHTML=h;
// Store filtered data for detail view
window._filt=f;
}

window.showDetail=function(el){
const p=window._filt[+el.dataset.i];if(!p)return;
document.getElementById('mt').textContent=p.t;
let b='<div class="mrow"><div class="ml">Kod:</div><div class="mv">'+esc(p.k)+'</div></div>'
+'<div class="mrow"><div class="ml">Kateqoriya:</div><div class="mv">'+esc(p.c)+'</div></div>'
+'<div class="mrow"><div class="ml">Alt kateqoriya:</div><div class="mv">'+esc(p.s)+'</div></div>';
if(p.v){
b+='<div style="margin-top:16px;font-size:13px;font-weight:600;color:var(--pri)">Mövcud variantlar:</div><div class="mvars">';
p.v.split(' / ').forEach(v=>{b+='<span class="mvar">'+esc(v)+'</span>'});
b+='</div>';
}
b+='<button class="mcta" onclick="window.parent.postMessage({type:\'mcQuote\',product:\''+esc(p.t)+'\'},\'*\')">Qiymət sorğusu göndər</button>';
document.getElementById('mbd').innerHTML=b;
document.getElementById('mbg').classList.add('show');
};

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
