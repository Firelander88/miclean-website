version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miclean-website
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - ./data:/app/data       # persist contact/quote JSON files
      - ./logs:/app/logs       # persist log files
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: Nginx reverse proxy (uncomment for production with SSL)
